<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Mahsulotni o'chirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 border-danger">
                <h3 class="text-danger mb-3">Mahsulotni o'chirish</h3>
                <p>Haqiqatan ham <strong>"{{ mahsulot.nomi }}"</strong> mahsulotini tizimdan butunlay o'chirmoqchimisiz?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger flex-grow-1">Ha, o'chirilsin</button>
                        <a href="{% url 'mahsulot_list' %}" class="btn btn-secondary flex-grow-1">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
